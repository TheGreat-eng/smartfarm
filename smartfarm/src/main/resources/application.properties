# ===================== APPLICATION =====================
server.port=8080
spring.application.name=smart-farm-backend

# ===================== DATABASE (MySQL) =====================
# Cấu hình cho local development. Sẽ bị ghi đè bởi biến môi trường trong Docker.
spring.datasource.url=jdbc:mysql://localhost:3307/smartfarm?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================== JPA / HIBERNATE =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Dòng này cần thiết cho việc map kiểu JSON trong các Entity
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===================== INFLUXDB =====================
influxdb.url=${INFLUXDB_URL:http://localhost:8086}
influxdb.token=${INFLUXDB_TOKEN:my-super-secret-token}
influxdb.org=${INFLUXDB_ORG:smart-farm}
influxdb.bucket=${INFLUXDB_BUCKET:sensor-data}

# ===================== MQTT =====================
mqtt.broker-url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client-id=${MQTT_CLIENT_ID:smart-farm-server}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}



# ===================== EXTERNAL SERVICES =====================
# OpenWeather API
openweather.api.key=7884074a54f3d2baf0b79866f3edeb6c
openweather.api.url=https://api.openweathermap.org/data/2.5
# AI Service (Python)
ai.service.url=http://localhost:5001/predict

# ===================== EMAIL (Gmail SMTP) =====================
